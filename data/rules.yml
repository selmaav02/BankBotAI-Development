version: "3.1"

rules:

# -------- BASIC RULES --------

- rule: greet
  steps:
  - intent: greet
  - action: utter_greet

- rule: goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: support
  steps:
  - intent: contact_support
  - action: utter_contact_support

- rule: thank you
  steps:
  - intent: thank_you
  - action: utter_thank_you

# -------- BALANCE CHECK RULES --------

- rule: check balance without type - ask type
  steps:
  - intent: check_balance
  - action: utter_ask_account_type

- rule: user provides account type - ask number
  steps:
  - intent: provide_account_type
  - action: utter_ask_account_number

- rule: check balance with savings type - ask number
  condition:
  - slot_was_set:
    - account_type: savings
  steps:
  - intent: check_balance
  - action: utter_ask_account_number

- rule: check balance with current type - ask number
  condition:
  - slot_was_set:
    - account_type: current
  steps:
  - intent: check_balance
  - action: utter_ask_account_number

- rule: user provides account number - show balance
  steps:
  - intent: provide_account_number
  - action: utter_check_balance

# -------- LOAN RULES --------

- rule: loan inquiry without type
  condition:
  - slot_was_set:
    - loan_type: null
  steps:
  - intent: loan_inquiry
  - action: utter_ask_loan_type

- rule: loan inquiry with type
  condition:
  - slot_was_set:
    - loan_type
  steps:
  - intent: loan_inquiry
  - action: utter_loan_info

- rule: provide loan type
  steps:
  - intent: provide_loan_type
  - action: utter_loan_info

# -------- OTHER BANKING RULES --------

- rule: block card
  steps:
  - intent: block_card
  - action: utter_card_blocked

- rule: account opening
  steps:
  - intent: account_opening
  - action: utter_account_opening

- rule: transaction
  steps:
  - intent: transaction_status
  - action: utter_transaction_result

- rule: Respond to fund transfer
  steps:
  - intent: fund_transfer
  - action: utter_fund_transfer

- rule: Respond to branch locator
  steps:
  - intent: branch_locator
  - action: utter_branch_locator

- rule: Respond to atm locator
  steps:
  - intent: atm_locator
  - action: utter_atm_locator

- rule: Respond to interest rate query
  steps:
  - intent: interest_rate_query
  - action: utter_interest_rate_query

- rule: Respond to kyc update
  steps:
  - intent: kyc_update
  - action: utter_kyc_update

# -------- CHITCHAT RULES --------

- rule: respond to bot name
  steps:
  - intent: ask_bot_name
  - action: utter_ask_bot_name

- rule: respond to weather
  steps:
  - intent: ask_weather
  - action: utter_ask_weather

- rule: respond to how doing
  steps:
  - intent: ask_howdoing
  - action: utter_ask_howdoing

- rule: respond to what can you do
  steps:
  - intent: ask_whatcanyoudo
  - action: utter_ask_whatcanyoudo

- rule: respond to joke
  steps:
  - intent: ask_joke
  - action: utter_ask_joke

- rule: respond to time
  steps:
  - intent: ask_time
  - action: utter_ask_time

# -------- FALLBACK RULE --------

- rule: Ask the user to rephrase whenever they send a message with low NLU confidence
  steps:
  - intent: nlu_fallback
  - action: utter_please_rephrase
