<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBank Virtual Assistant</title>
<meta name="description" content="Chat with NexaBank's AI-powered virtual banking assistant.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-container">
  <div class="chat-panel">
    <div class="chat-container" id="chatContainer">

      <!-- Header -->
      <div class="chat-header">
        <div class="header-left">
          <a href="/home" class="back-btn" title="Back to Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
          <div class="bot-avatar-header">
            <img src="/static/nexabank_assistant.png" alt="INB Assistant"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <svg style="display:none" width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="white" opacity="0.3"/>
              <path d="M12 6c-1.1 0-2 .9-2 2v1H8v2h8v-2h-2V8c0-1.1-.9-2-2-2zm-4 7v4h8v-4H8z" fill="white"/>
            </svg>
          </div>
          <div class="header-info">
            <h1>NexaBank Virtual Assistant</h1>
            <div class="status-indicator" id="statusIndicator">
              <span class="status-dot online" id="statusDot"></span>
              <span class="status-text" id="statusText">Online</span>
            </div>
          </div>
        </div>
        <div class="header-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Secure Chat</span>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea">
        <div class="date-divider"><span id="currentDate"></span></div>
      </div>

      <!-- Error Banner -->
      <div class="error-banner" id="errorBanner" style="display:none;">
        <div class="error-icon">⚠️</div>
        <span id="errorText">Connection error. Retrying in 5 seconds...</span>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="userInput" placeholder="Ask about balance, transfers, loans..." autocomplete="off">
          <button id="sendBtn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Powered by NexaBank AI · Your queries are secure and encrypted</div>
      </div>

    </div>
  </div>
</div>
<script src="/static/js/script.js"></script>
</body>
</html>
